<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SSUET AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --purple:#6a0dad;--purple-light:#8e24aa;--purple-dark:#4a0080;
            --green:#1a8c3f;--green-light:#22a84e;--gold:#f5a623;
            --white:#fff;--bg:#f5f0fa;--surface:#fff;
            --border:#e0d0f0;--text:#1a0a2e;--muted:#7a6a8a;
        }
        body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 0% 0%,rgba(106,13,173,0.1) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 100% 100%,rgba(26,140,63,0.08) 0%,transparent 60%);pointer-events:none;z-index:0}
        .auth-container{background:var(--surface);border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(106,13,173,0.15);position:relative;z-index:1;border:1.5px solid var(--border)}
        .auth-logo{width:70px;height:70px;background:linear-gradient(135deg,var(--purple-dark),var(--purple-light));border-radius:18px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 6px 20px rgba(106,13,173,.3)}
        .auth-title{font-size:22px;font-weight:700;color:var(--purple-dark);text-align:center;margin-bottom:8px}
        .auth-subtitle{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
        .form-group{margin-bottom:18px}
        .form-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;display:block}
        .form-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:'Poppins',sans-serif;outline:none;transition:border-color .2s}
        .form-input:focus{border-color:var(--purple)}
        .form-input::placeholder{color:var(--muted)}
        .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple),var(--purple-light));color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Poppins',sans-serif;box-shadow:0 4px 12px rgba(106,13,173,0.3)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(106,13,173,0.4)}
        .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .auth-footer{margin-top:24px;text-align:center;font-size:13px;color:var(--muted)}
        .auth-footer a{color:var(--purple);text-decoration:none;font-weight:600}
        .auth-footer a:hover{text-decoration:underline}
        .error-msg{background:#fee2e2;border:1px solid #ef4444;color:#dc2626;padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:16px;display:none}
        .success-msg{background:#f0fdf4;border:1px solid var(--green);color:var(--green);padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:16px;display:none}
        .info-box{background:#f8f0ff;border:1px dashed var(--purple);border-radius:10px;padding:12px;margin-bottom:20px}
        .info-box p{font-size:11px;color:var(--purple);line-height:1.5}
        .info-box strong{color:var(--purple-dark)}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">🎓</div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join SSUET AI Assistant to save your conversations</p>
        
        <div class="info-box">
            <p>📢 <strong>Admission Lead Capture:</strong> By registering, your information will be shared with SSUET Admissions Office for future updates about programs and admissions.</p>
        </div>
        
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="name" placeholder="Muhammad Ahmed" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="email" placeholder="student@ssuet.edu.pk" required>
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" id="phone" placeholder="0300-1234567" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="password" placeholder="Min 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="/login">Login Here</a>
        </div>
    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, phone, password})
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    successMsg.textContent = data.message + ' Redirecting to login...';
                    successMsg.style.display = 'block';
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    errorMsg.textContent = data.error || 'Registration failed';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch(err) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        }
    </script>
</body>
</html>
